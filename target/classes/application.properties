# ===========================
# DATASOURCE - MySQL
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/comanda_digital?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=comanda
spring.datasource.password=comanda123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================
# Flyway
# ===========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===========================
# JWT
# ===========================
jwt.secret=comanda-digital-secret-key-unasp-sp-2026-very-long-secret-key-for-hs256
jwt.expiration=28800000

# ===========================
# Server
# ===========================
server.port=8080

# ===========================
# SpringDoc / Swagger
# ===========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

# ===========================
# Jackson
# ===========================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
